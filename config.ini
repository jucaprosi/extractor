[Logging]
# --- Niveles de Log ---
# DEBUG:   Máximo detalle, para depuración profunda.
# INFO:    Información general del flujo de la aplicación.
# WARNING: Advertencias sobre situaciones inesperadas pero no críticas.
# ERROR:   Errores que impiden una operación pero no detienen la aplicación.
# CRITICAL: Errores graves que pueden detener la aplicación.

level = DEBUG